# Reusable theme-apply block: branch on detect-theme output (OSC 11 →
# VS Code settings.json → Apple Terminal → COLORFGBG → dark). Sourced at
# config load, on attach, and by newer tmux light/dark client hooks.
# Missing helper → `if-shell` predicate fails → dark default.

if-shell '[ "$(~/.local/bin/detect-theme 2>/dev/null)" = "light" ]' {
    set -g status-style bg=colour254,fg=colour238
    set -g status-left "#[fg=colour231,bg=colour33,bold] #S #[default] "
    set -g status-right "#[fg=colour238] #(cd #{pane_current_path}; git symbolic-ref --short HEAD 2>/dev/null) #[fg=colour238]%H:%M "
    setw -g window-status-current-format "#[fg=colour231,bg=colour33,bold] #I:#W "
    setw -g window-status-format " #[fg=colour238]#I:#W "
    set -g pane-active-border-style fg=colour33
    set -g pane-border-style fg=colour250
} {
    set -g status-style bg=colour235,fg=colour252
    set -g status-left "#[fg=colour16,bg=colour39,bold] #S #[default] "
    set -g status-right "#[fg=colour248] #(cd #{pane_current_path}; git symbolic-ref --short HEAD 2>/dev/null) #[fg=colour252]%H:%M "
    setw -g window-status-current-format "#[fg=colour16,bg=colour39,bold] #I:#W "
    setw -g window-status-format " #[fg=colour248]#I:#W "
    set -g pane-active-border-style fg=colour39
    set -g pane-border-style fg=colour238
}
