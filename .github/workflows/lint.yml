name: Lint

on:
  push:
    paths: ['*.sh', 'lib/*.sh', '.githooks/*']
  pull_request:
    paths: ['*.sh', 'lib/*.sh', '.githooks/*']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          additional_files: .githooks/pre-commit
        env:
          SHELLCHECK_OPTS: --exclude=SC1091
