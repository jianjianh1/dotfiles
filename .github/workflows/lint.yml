name: Lint

on:
  push:
    paths:
      - '**/*.sh'
      - 'chpc-allocs.py'
      - 'test_regressions.sh'
      - '.githooks/**'
      - 'bashrc_*'
      - 'vimrc'
      - 'nvim/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**/*.sh'
      - 'chpc-allocs.py'
      - 'test_regressions.sh'
      - '.githooks/**'
      - 'bashrc_*'
      - 'vimrc'
      - 'nvim/**'
      - '.github/workflows/lint.yml'

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # `shell: bash` picks bash from PATH (Homebrew bash 5 on macOS),
    # matching what `#!/usr/bin/env bash` shebangs in this repo
    # resolve to at runtime. The default `/bin/bash` on macOS is 3.2
    # and chokes on bash-4+ syntax (e.g. `local -`).
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck (pinned)
        # Pin to a specific upstream release so a new shellcheck version
        # doesn't make previously-passing code start failing in CI.
        env:
          SHELLCHECK_VERSION: v0.10.0
        run: |
          set -eu -o pipefail
          if [ "$(uname -s)" = "Darwin" ]; then
            arch="$(uname -m)"; [ "$arch" = "arm64" ] && arch="aarch64"
            url="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.darwin.${arch}.tar.xz"
          else
            url="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          fi
          curl -sfL "$url" | tar xJ -C /tmp
          sudo install -m 0755 "/tmp/shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version
      - name: Syntax check
        run: |
          bash -n setup.sh deploy.sh uninstall.sh install_claude_plugins.sh lib/common.sh .githooks/pre-commit test_regressions.sh bashrc_exports bashrc_aliases
      - name: ShellCheck
        run: |
          shellcheck --severity=warning --exclude=SC1091 setup.sh deploy.sh uninstall.sh install_claude_plugins.sh lib/common.sh .githooks/pre-commit test_regressions.sh bashrc_exports bashrc_aliases
      - name: Install ruff (pinned)
        # Pin like shellcheck so a new ruff release doesn't fail
        # previously-passing code without a code change. Use the
        # prebuilt binary from the GitHub release instead of pip:
        # macOS runners ship a PEP 668 externally-managed Homebrew
        # Python that refuses `pip install --user`.
        env:
          RUFF_VERSION: 0.8.4
        run: |
          set -eu -o pipefail
          if [ "$(uname -s)" = "Darwin" ]; then
            arch="$(uname -m)"
            case "$arch" in
              arm64) target="aarch64-apple-darwin" ;;
              x86_64) target="x86_64-apple-darwin" ;;
              *) echo "Unsupported macOS arch: $arch" >&2; exit 1 ;;
            esac
          else
            target="x86_64-unknown-linux-gnu"
          fi
          url="https://github.com/astral-sh/ruff/releases/download/${RUFF_VERSION}/ruff-${target}.tar.gz"
          mkdir -p "$HOME/.local/bin"
          curl -sfL "$url" | tar xz -C /tmp
          install -m 0755 "/tmp/ruff-${target}/ruff" "$HOME/.local/bin/ruff"
          "$HOME/.local/bin/ruff" --version
      - name: Lint Python
        run: |
          # Stick to ruff's default rule set (pyflakes + pycodestyle E)
          # so we catch real bugs without arguing over style. chpc-allocs
          # is the only Python file in the tree today.
          "$HOME/.local/bin/ruff" check chpc-allocs.py
      - name: Regression tests
        run: bash test_regressions.sh
      - name: Safe smoke checks
        run: |
          ./deploy.sh --help
          ./uninstall.sh --help
          HOME="$(mktemp -d)" ./setup.sh --dry-run
          ./setup.sh --probe-modules || true  # fails off-CHPC; just exercise the wiring
