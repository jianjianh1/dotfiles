# Starship prompt — light-terminal variant of starship.toml.
# Selected automatically when SERVER_CONFIGS_THEME=light (see bashrc_exports).
# Docs: https://starship.rs/config/

format = """$username$hostname$directory$git_branch$git_status$python$c$cmd_duration$line_break$character"""

add_newline = false

[username]
show_always = false
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "bold blue"
format = "[@$hostname]($style)"

[directory]
style = "bold blue"
truncation_length = 4
truncation_symbol = ".../"
format = "[:$path]($style)[$read_only]($read_only_style) "

[git_branch]
style = "bold 130"
format = "[($branch)]($style)"

[git_status]
style = "bold 130"
format = "[$all_status$ahead_behind]($style) "

[python]
format = "[py$version]($style) "
style = "dim 240"

[c]
format = "[$name $version]($style) "
style = "dim 240"

[cmd_duration]
min_time = 2_000
style = "dim 240"
format = "[took $duration]($style) "

[character]
success_symbol = "[\\$](bold black)"
error_symbol = "[\\$](bold red)"
