# Codex CLI configuration
# Copied to ~/.codex/config.toml by install.sh

# Reasoning
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"

# Git attribution
commit_attribution = ""

# No-restriction mode — all actions auto-approved, full access
approval_policy = "never"
sandbox_mode = "danger-full-access"

# Shell — inherit all env vars so tools like gh, npm, etc. work
[shell_environment_policy]
inherit = "all"

# History — persist sessions, cap at 50MB
[history]
persistence = "save-all"
max_bytes = 52428800

# Notifications on completion
[tui]
notifications = true
animations = true

[projects."/uufs/chpc.utah.edu/common/home/u1446071/.dotfiles"]
trust_level = "trusted"
