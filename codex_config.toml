# Codex CLI configuration
# Symlinked to ~/.codex/config.toml by setup.sh

# Reasoning
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"

# Git attribution
commit_attribution = ""

# Bypass approvals and sandbox (equivalent to --dangerously-bypass-approvals-and-sandbox)
approval_policy = "never"
sandbox_mode = "danger-full-access"

# Shell — inherit all env vars so tools like gh, npm, etc. work
[shell_environment_policy]
inherit = "all"

# History — persist sessions, cap at 50MB
[history]
persistence = "save-all"
max_bytes = 52428800

# Notifications on completion
[tui]
notifications = true
animations = true

[projects."/uufs/chpc.utah.edu/common/home/u1446071/.server-configs"]
trust_level = "trusted"
