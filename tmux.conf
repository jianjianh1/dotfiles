# --- Prefix ---
# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Compatibility ---
if-shell '[ -f ~/.server-configs-generated/tmux.compat.conf ]' 'source-file ~/.server-configs-generated/tmux.compat.conf'

# --- General ---
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -sg escape-time 10
set -g allow-rename off
set -g focus-events on

# --- Copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || wl-copy 2>/dev/null || xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null"

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in the current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation ---
# With prefix: vim-style h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Without prefix: Alt+arrow
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Window switching (no prefix) ---
bind -n S-Left  previous-window
bind -n S-Right next-window

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Session switching ---
bind S choose-tree -sZ

# --- Reload ---
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# --- Status bar ---
set -g status-left-length 20
set -g status-right-length 60

# Palette branches on $SERVER_CONFIGS_THEME (set by bashrc_exports).
# Each branch defines status-left/right too — they share a common shape but
# carry per-theme colours, so they belong inside the if-shell, not above it.
if-shell '[ "$SERVER_CONFIGS_THEME" = "light" ]' '\
    set -g status-style bg=colour254,fg=colour238 ; \
    set -g status-left "#[fg=colour231,bg=colour33,bold] #S #[default] " ; \
    set -g status-right "#[fg=colour238] #(cd #{pane_current_path}; git symbolic-ref --short HEAD 2>/dev/null) #[fg=colour238]%H:%M " ; \
    setw -g window-status-current-format "#[fg=colour231,bg=colour33,bold] #I:#W " ; \
    setw -g window-status-format " #[fg=colour238]#I:#W " ; \
    set -g pane-active-border-style fg=colour33 ; \
    set -g pane-border-style fg=colour250 \
' '\
    set -g status-style bg=colour235,fg=colour252 ; \
    set -g status-left "#[fg=colour16,bg=colour39,bold] #S #[default] " ; \
    set -g status-right "#[fg=colour248] #(cd #{pane_current_path}; git symbolic-ref --short HEAD 2>/dev/null) #[fg=colour252]%H:%M " ; \
    setw -g window-status-current-format "#[fg=colour16,bg=colour39,bold] #I:#W " ; \
    setw -g window-status-format " #[fg=colour248]#I:#W " ; \
    set -g pane-active-border-style fg=colour39 ; \
    set -g pane-border-style fg=colour238 \
'

# Propagate theme env to panes attached to existing sessions so the prompt
# colours pick the right starship/dircolors config without a fresh login.
set -ga update-environment SERVER_CONFIGS_THEME

# --- Plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# TPM bootstrap (install with: prefix + I)
if-shell '[ -d ~/.tmux/plugins/tpm ]' 'run ~/.tmux/plugins/tpm/tpm'
