# --- Prefix ---
# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Compatibility ---
if-shell '[ -f ~/.server-configs-generated/tmux.compat.conf ]' 'source-file ~/.server-configs-generated/tmux.compat.conf'

# --- General ---
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -sg escape-time 10
set -g allow-rename off
set -g focus-events on

# --- Copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || wl-copy 2>/dev/null || xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null"

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in the current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation ---
# With prefix: vim-style h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Without prefix: Alt+arrow
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Window switching (no prefix) ---
bind -n S-Left  previous-window
bind -n S-Right next-window

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Session switching ---
bind S choose-tree -sZ

# --- Reload ---
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# --- Status bar ---
set -g status-left-length 20
set -g status-right-length 60

# Pane shells still read SERVER_CONFIGS_THEME for bat/delta/dircolors/starship.
# COLORTERM gates termguicolors in nvim/vim — without it, panes inside tmux
# can't tell the outer terminal supports truecolor and stay on safe 256-color.
set -ga update-environment SERVER_CONFIGS_THEME
set -ga update-environment COLORTERM

# Palette follows the shared detect-theme helper. tmux 3.6+ also triggers
# theme hooks when the attached client switches light/dark.
source-file ~/.tmux-theme.conf
set-hook -g client-attached "source-file ~/.tmux-theme.conf"
if -F '#{>=:#{version},3.6}' 'set-hook -g client-light-theme "source-file ~/.tmux-theme.conf"'
if -F '#{>=:#{version},3.6}' 'set-hook -g client-dark-theme "source-file ~/.tmux-theme.conf"'

# --- Plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# TPM bootstrap (install with: prefix + I)
if-shell '[ -d ~/.tmux/plugins/tpm ]' 'run ~/.tmux/plugins/tpm/tpm'
