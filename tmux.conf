# --- Prefix ---
# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -sg escape-time 10
set -g allow-rename off
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- Copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null"

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in the current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation ---
# With prefix: vim-style h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Without prefix: Alt+arrow
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Window switching (no prefix) ---
bind -n S-Left  previous-window
bind -n S-Right next-window

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Session switching ---
bind S choose-tree -sZ

# --- Reload ---
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# --- Status bar ---
set -g status-style bg=colour235,fg=colour252
set -g status-left-length 20
set -g status-right-length 60
set -g status-left "#[fg=colour16,bg=colour39,bold] #S #[default] "
set -g status-right "#[fg=colour248] #(cd #{pane_current_path}; git symbolic-ref --short HEAD 2>/dev/null) #[fg=colour252]%H:%M "
setw -g window-status-current-format "#[fg=colour16,bg=colour39,bold] #I:#W "
setw -g window-status-format " #[fg=colour248]#I:#W "

# --- Pane borders ---
set -g pane-active-border-style fg=colour39
set -g pane-border-style fg=colour238

# --- Passthrough ---
set -g allow-passthrough on
