# --- Prefix ---
# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g mouse on                    # Enable mouse (scroll, resize, select panes)
set -g history-limit 10000         # Longer scrollback buffer
set -g base-index 1                # Start window numbering at 1
setw -g pane-base-index 1          # Start pane numbering at 1
set -g renumber-windows on         # Renumber windows when one is closed
set -s escape-time 0               # No delay after pressing Escape
set -g default-terminal "screen-256color"  # 256-color support

# --- Splits ---
# Use | and - for splitting (easier to remember than % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in the current directory
bind c new-window -c "#{pane_current_path}"

# --- Navigation ---
# Switch panes with Alt+arrow (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch windows with Shift+arrow (no prefix needed)
bind -n S-Left  previous-window
bind -n S-Right next-window

# --- Resize ---
# Resize panes with prefix + Ctrl+arrow
bind -r C-Left  resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up    resize-pane -U 5
bind -r C-Down  resize-pane -D 5

# --- Reload ---
# Prefix + r to reload this config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Status Bar ---
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"
set -g status-left " #S "
set -g status-left-style "bg=colour25,fg=colour255,bold"
set -g status-right " %H:%M  %d-%b-%y "
set -g status-right-style "bg=colour235,fg=colour248"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "bg=colour25,fg=colour255,bold"

# --- Pane Borders ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour25"
